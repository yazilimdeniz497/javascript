<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container">
      <div class="row">
        <div class="col-12">
          <div class="card">
            <div class="card-header">Todo App</div>
            <div class="card-body">
              <form>
                <div class="input-group">
                  <input type="text" id="AddnewTasktxt" class="form-control" />
                  <button class="btn btn-primary" type="button" id="AddnewTask">
                    Ekle
                  </button>
                </div>
              </form>
            </div>
          </div>
          <div class="card">
            <div class="card-header">
              <button class="btn btn-danger float-end">Temizle</button>
            </div>
            <ul class="task-list list-group mt-3 list-group-flush">
              <li class="task list-group-item">
                <div class="form-check">
                  <input type="checkbox" id="1" class="form-check-input" />
                  <label for="1" class="form-label">Görev 1</label>
                </div>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
    <script>
        let ul = document.querySelector(".task-list");
        let count = ul.children.length;

    //   ul.appendChild(li);
      //   ul.children[0].setAttribute("class", "bg-danger");
      let addButton = document.querySelector("#AddnewTask");
      addButton.addEventListener("click", function () {
        let ul = document.querySelector(".task-list");
        let input = document.querySelector("#AddnewTasktxt").value;
        let li = `
      <li class="task list-group-item">
                <div class="form-check">
                  <input type="checkbox" id="${count + 1}" class="form-check-input" />
                  <label for="${count + 1}" class="form-check-label">${input}</label>
                </div>
              </li>
      `;
        
        //
      
        ul.insertAdjacentHTML("beforeend",li);
      });
    </script>
  </body>
</html>
